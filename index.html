<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Autobusy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --c159: #f97316;
    --c168: #38bdf8;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

#s-select {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 2.5rem 1.5rem;
gap: 2rem;
}
.title { text-align: center; }
.eyebrow {
font-size: 0.65rem;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 0.5rem;
}
h1 {
font-size: clamp(2rem, 9vw, 3rem);
font-weight: 800;
line-height: 1.05;
}
.cards {
width: 100%;
max-width: 400px;
display: flex;
flex-direction: column;
gap: 0.9rem;
}
.card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 1.1rem;
padding: 1.4rem 1.5rem;
cursor: pointer;
transition: border-color 0.18s, transform 0.12s;
}
.card:active { transform: scale(0.97); border-color: var(--muted); }
.card-lbl {
font-size: 0.6rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 0.35rem;
}
.card-name {
font-size: 1.1rem;
font-weight: 700;
line-height: 1.25;
margin-bottom: 0.75rem;
}
.pills { display: flex; gap: 0.4rem; }
.pill {
font-family: 'DM Mono', monospace;
font-size: 0.8rem;
padding: 0.18rem 0.55rem;
border-radius: 999px;
}
.p159 { background: rgba(249,115,22,.15); color: var(--c159); }
.p168 { background: rgba(56,189,248,.15); color: var(--c168); }

#s-dep {
display: none;
flex-direction: column;
flex: 1;
}
.dep-head {
display: flex;
align-items: center;
gap: 0.8rem;
padding: 1rem 1.2rem;
border-bottom: 1px solid var(--border);
flex-shrink: 0;
}
.back-btn {
background: none;
border: 1px solid var(--border);
color: var(--muted);
border-radius: 0.5rem;
width: 2.2rem; height: 2.2rem;
cursor: pointer;
font-size: 1rem;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.dep-stop { flex: 1; min-width: 0; }
.dep-stop-lbl {
font-size: 0.58rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(--muted);
}
.dep-stop-name {
font-size: 0.88rem;
font-weight: 700;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
#clock {
font-family: 'DM Mono', monospace;
font-size: 0.8rem;
color: var(--muted);
flex-shrink: 0;
}
.panels {
flex: 1;
display: flex;
min-height: 0;
}
.panel {
flex: 1;
display: flex;
flex-direction: column;
padding: 1rem 0.9rem 1.2rem;
min-width: 0;
}
.panel + .panel { border-left: 1px solid var(--border); }
.badge {
font-family: 'DM Mono', monospace;
font-size: 1.8rem;
font-weight: 500;
line-height: 1;
padding: 0.15rem 0.45rem;
border-radius: 0.4rem;
display: inline-block;
align-self: flex-start;
margin-bottom: 0.8rem;
flex-shrink: 0;
}
.b159 { color: var(--c159); background: rgba(249,115,22,.12); }
.b168 { color: var(--c168); background: rgba(56,189,248,.12); }
.counter {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
gap: 0.25rem;
}
.cnum {
font-family: 'DM Mono', monospace;
font-size: clamp(3.5rem, 14vw, 5.5rem);
font-weight: 400;
line-height: 1;
transition: color 0.35s;
}
.cunit {
font-size: 0.62rem;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(--muted);
}
.chm {
font-family: 'DM Mono', monospace;
font-size: 0.9rem;
color: var(--muted);
margin-top: 0.2rem;
}
.next {
border-top: 1px solid var(--border);
padding-top: 0.65rem;
display: flex;
flex-direction: column;
gap: 0.28rem;
flex-shrink: 0;
}
.next-lbl {
font-size: 0.52rem;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 0.15rem;
}
.next-row { display: flex; justify-content: space-between; }
.nt { font-family: 'DM Mono', monospace; font-size: 0.78rem; }
.nm { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
.state-msg {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.75rem;
color: var(--muted);
}
.pbar { height: 2px; background: var(--border); flex-shrink: 0; }
.pbar-fill { height: 100%; background: var(--muted); transition: width 1s linear; } </style>

</head>
<body>

<div id="s-select">...</div>
<div id="s-dep">...</div>

<script>
const STOPS = {
  baltyk: { name: 'Batalionu AK „Bałtyk”', id: '3427', nr: '02' },
  polnoc: { name: 'Grupy AK „Północ”', id: '3428', nr: '02' },
};
const REFRESH = 30;
let currentStop = null, refreshIv = null, clockIv = null, barIv = null;

// ✅ poprawka 1: res.ok
async function fetchLine(stopId, stopNr, line) {
  const res = await fetch(`/api/departures?stopId=${stopId}&stopNr=${stopNr}&line=${line}`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  return data.result || [];
}

function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function untilMin(t) {
  const n=new Date(), now=n.getHours()*60+n.getMinutes();
  let d=toMin(t)-now; if(d<-60) d+=1440; return d;
}
function hm(t) { const p=t.split(':'); return String(parseInt(p[0])%24).padStart(2,'0')+':'+p[1]; }
function minColor(m) {
  if(m<=2) return '#f87171'; if(m<=5) return '#facc15';
  if(m<=15) return '#4ade80'; return '#e8e8f0';
}
function getBadge(line) {
  return `<div class="badge b${line}">${line}</div>`;
}

function renderPanel(line, entries) {
  const el = document.getElementById('panel-'+line);
  if (!entries || !entries.length) {
    el.innerHTML = getBadge(line) + '<div class="state-msg">brak odjazdów</div>';
    return;
  }
  const [first,...rest] = entries;
  const m = Math.max(0, first.diff);
  const nxt = rest.slice(0,3);
  el.innerHTML = getBadge(line) + `
    <div class="counter">
      <div class="cnum" style="color:${minColor(m)}">${m}</div>
      <div class="cunit">minut</div>
      <div class="chm">${hm(first.t)}</div>
    </div>
    ${nxt.length ? `<div class="next">
      <div class="next-lbl">Następne</div>
      ${nxt.map(r=>`<div class="next-row"><span class="nt">${hm(r.t)}</span><span class="nm">za ${Math.max(0,r.diff)} min</span></div>`).join('')}
    </div>` : ''}`;
}

function setMsg(line, msg) {
  document.getElementById('panel-'+line).innerHTML = getBadge(line)+`<div class="state-msg">${msg}</div>`;
}

// ✅ poprawka 2: Promise.all
async function fetchAll() {
  if (!currentStop) return;
  const { id, nr } = STOPS[currentStop];

  const lines = ['159','168'];

  const results = await Promise.all(
    lines.map(line => 
      fetchLine(id, nr, line)
        .then(raw => ({ line, raw }))
        .catch(err => ({ line, error: err }))
    )
  );

  for (const r of results) {
    if (r.error) {
      console.error(r.line, r.error);
      setMsg(r.line, '⚠ błąd połączenia');
      continue;
    }

    const entries = r.raw
      .map(e => { const v=e.values?.find(x=>x.key==='czas'); return v?v.value:null; })
      .filter(Boolean)
      .map(t=>({t, diff:untilMin(t)}))
      .filter(x=>x.diff>=-1&&x.diff<120)
      .sort((a,b)=>a.diff-b.diff);

    renderPanel(r.line, entries);
  }
}
</script>

</body>
</html>
